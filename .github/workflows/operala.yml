name: OperaLa

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: operala-${{ github.ref }}
  cancel-in-progress: true

jobs:
  authoring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install ripgrep and jq
        run: sudo apt-get update && sudo apt-get install -y ripgrep jq
      - name: Check OperaLa authoring surface
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-features
          bash scripts/validate_codex_material.sh
          bash tools/i18n.sh validate
