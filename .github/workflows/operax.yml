name: OperaLa / OperaX Integration

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: operala-operax-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OperaLa
        uses: actions/checkout@v4
        with:
          path: greentic-operala
      - name: Checkout Greentic Pack
        uses: actions/checkout@v4
        with:
          repository: greenticai/greentic-pack
          path: greentic-pack
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            greentic-operala
            greentic-pack
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq ripgrep
      - name: Install Greentic binary tools
        run: |
          cargo install cargo-binstall --locked
          cargo binstall -y greentic-operax
      - name: Build OperaLa pilot artifact
        working-directory: greentic-operala
        run: |
          cargo run --bin greentic-operala -- prompt --locale en-GB --tenant demo-tenant --team property-ops \
            --sorla examples/tenancy/sorla.yaml \
            --output target/operala-demo/answers.json \
            "$(cat examples/tenancy/prompt.txt)"
          cargo run --bin greentic-operala -- wizard --answers target/operala-demo/answers.json --locale en-GB
      - name: Run installed OperaX against OperaLa artifact
        working-directory: greentic-operala
        run: |
          greentic-operax run \
            target/gtpacks/tenancy-rent-reconciliation.gtpack \
            --tenant demo-tenant \
            --team property-ops \
            --sorx-url http://localhost:8088 \
            --input examples/tenancy/banking/one-transaction.json \
            --dry-run \
            --json
